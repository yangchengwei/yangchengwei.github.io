<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="承尉🥂靜宜">
    <meta property="og:description" content="叮咚~您有一封未讀取的信件~">
    <meta property="og:image" content="https://yangchengwei.github.io/image.jpg">

    <title>承尉🥂靜宜</title>

    <style>
        :root {
            --scale: 1; 
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            background: radial-gradient(circle at center, #FDFBF7 0%, #E8DFD5 100%);
            user-select: none; 
            -webkit-user-select: none;
        }

        .scene {
            position: relative;
            transform: scale(var(--scale));
            transform-origin: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope-wrapper {
            position: relative;
            top: 0; 
            width: 360px;
            height: 240px;
            animation: flyIn 1.8s cubic-bezier(0.25, 1, 0.4, 1) forwards;
            cursor: pointer;
            transition: top 2s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
        }

        .envelope-wrapper.open {
            top: 150px; 
        }

        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #E8DACB;
            border-radius: 6px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 15px 35px rgba(180, 160, 140, 0.4);
            z-index: 1;
        }

        .letter {
            position: absolute;
            width: 310px;    
            height: 430px;   
            left: 25px;      
            top: 15px; 
            background-color: transparent;
            border-radius: 6px;
            clip-path: inset(0 0 210px 0); 
            z-index: 3; 
            perspective: 1200px; 
        }

        .letter.no-clip {
            clip-path: none !important;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            border-radius: 6px;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            object-fit: cover;
            border-radius: 6px;
            background-color: #FCFAF8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            pointer-events: none; 
        }

        .card-back {
            transform: rotateY(180deg); 
        }

        .front-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            filter: drop-shadow(0 -3px 8px rgba(180, 160, 140, 0.3));
            pointer-events: none;
        }

        .front-shape {
            width: 100%;
            height: 100%;
            background: #FCFAF8;
            clip-path: path('M 0,240 L 360,240 L 360,0 Q 180,140 0,0 Z');
        }

        .top-flap-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 170px;
            z-index: 5;
            transform-origin: top;
            filter: drop-shadow(0 4px 10px rgba(180, 160, 140, 0.35));
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0s 0.3s;
        }

        .flap-shape {
            width: 100%;
            height: 100%;
            background: #FCFAF8;
            clip-path: path('M 0,0 L 360,0 L 220,105 Q 180,145 140,105 Z');
        }

        .wax-seal {
            position: absolute;
            width: 46px;
            height: 46px;
            background-color: #8B2632;
            border-radius: 50%;
            left: 157px;
            top: 100px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E2C792;
            font-size: 20px;
            animation: pulse 2s infinite;
        }

        .music-player {
            position: absolute;
            bottom: 12px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(252, 250, 248, 0.9);
            border: 1px solid #E8DACB;
            padding: 6px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(180, 160, 140, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: sans-serif;
            color: #8B2632;
            z-index: 5; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease 1s, transform 0.2s ease, background 0.2s ease;
            cursor: pointer;
        }

        .envelope-wrapper.open .music-player {
            opacity: 1;
            pointer-events: auto;
        }

        .music-player:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateX(-50%) scale(1.05);
        }

        .music-player.playing .icon {
            animation: musicBounce 1s infinite alternate;
        }

        .music-player.paused {
            color: #A09890;
            border-color: #D8CEC3;
        }

        .music-player.paused .icon {
            filter: grayscale(100%);
        }

        .hint-click {
            position: absolute;
            left: 160px; 
            top: 130px;
            font-size: 40px; 
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .hint-swipe {
            position: absolute;
            top: 80%;
            left: 60px;
            font-size: 40px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .hint-click.active {
            animation: clickHintAnim 3s infinite;
        }

        .hint-swipe.active {
            animation: swipeHintAnim 3s infinite;
        }

        .envelope-wrapper.open .top-flap-container {
            transform: rotateX(180deg);
            z-index: 2; 
        }

        .envelope-wrapper.open .letter {
            animation: pullAndCenter 2s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
        }

        @keyframes flyIn {
            0% { transform: translateY(-800px) rotate(-10deg) scale(0.8); opacity: 0; }
            100% { transform: translateY(50px) rotate(0deg) scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 0 rgba(139, 38, 50, 0.4); }
            70% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 15px rgba(139, 38, 50, 0); }
            100% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 0 rgba(139, 38, 50, 0); }
        }

        @keyframes pullAndCenter {
            0% { transform: translateY(0); clip-path: inset(0 0 210px 0); z-index: 3; }
            49% { transform: translateY(-460px); clip-path: inset(0 0 0 0); z-index: 3; }
            50% { transform: translateY(-460px); clip-path: inset(0 0 0 0); z-index: 6; }
            100% { transform: translateY(-310px); clip-path: inset(0 0 0 0); z-index: 6; }
        }

        @keyframes musicBounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-2px) scale(1.1); }
        }

        @keyframes clickHintAnim {
            0%, 100% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            20% { opacity: 1; transform: translateY(0) scale(0.8); }
            30% { opacity: 1; transform: translateY(0) scale(1); }
            40% { opacity: 0; transform: translateY(10px); }
        }

        @keyframes swipeHintAnim {
            0%, 100% { opacity: 0; transform: translate(0, -50%); }
            10% { opacity: 1; transform: translate(0, -50%); }
            30% { opacity: 1; transform: translate(150px, -50%); } 
            40% { opacity: 0; transform: translate(160px, -50%); } 
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

    <div class="scene">
        <div class="envelope-wrapper" id="myEnvelope">
            <div class="envelope-back"></div>
            
            <div class="letter" id="myLetter">
                <div class="card-inner" id="cardInner">
                    <img class="card-face card-front" id="imgFront" src="info0.jpg" alt="Info 0">
                    <img class="card-face card-back" id="imgBack" src="info1.jpg" alt="Info 1">
                </div>
                <div class="hint-swipe" id="hintSwipe">👆</div>
            </div>

            <div class="front-pocket">
                <div class="front-shape"></div>
            </div>

            <div class="music-player paused" id="musicPlayer">
                <span class="icon">🎵</span>
                <span class="text">Music</span>
            </div>

            <div class="top-flap-container">
                <div class="flap-shape"></div>
                <div class="wax-seal">❤</div>
            </div>
            
            <div class="hint-click" id="hintClick">👆</div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('myEnvelope');
        const myLetter = document.getElementById('myLetter');
        const cardInner = document.getElementById('cardInner');
        const imgFront = document.getElementById('imgFront');
        const imgBack = document.getElementById('imgBack');
        
        const bgMusic = document.getElementById('bgMusic');
        const musicPlayer = document.getElementById('musicPlayer');
        const musicText = musicPlayer.querySelector('.text');

        const hintClick = document.getElementById('hintClick');
        const hintSwipe = document.getElementById('hintSwipe');

        const images = ['info0.jpg', 'info1.jpg', 'info2.jpg', 'info3.jpg'];
        
        let currentTotalRotation = 0; 
        let startRotation = 0;
        let isExtracted = false;    
        let isDragging = false;     
        let isAnimating = false;    
        let startX = 0;             
        let currentScale = 1; 
        
        // 🌟 更新：用 Set 集合來記錄「已經從哪些頁面滑動過」
        let swipedFromIndices = new Set();
        let swipeHintTimer;

        let clickHintTimer = setTimeout(() => {
            hintClick.classList.add('active');
        }, 3000);

        function adjustScale() {
            let targetScale = Math.min(window.innerWidth / 400, window.innerHeight / 650);
            targetScale = Math.min(targetScale, 1.5); 
            currentScale = targetScale;
            document.documentElement.style.setProperty('--scale', currentScale);
        }

        adjustScale();

        function getIndexForTurn(turn) {
            let index = turn % images.length;
            if (index < 0) index += images.length; 
            return index;
        }

        // 🌟 新增：統一控管滑動提示的函數
        function triggerSwipeHint() {
            clearTimeout(swipeHintTimer);
            hintSwipe.classList.remove('active');
            
            // 如果 4 頁都滑過了，就永遠不再顯示提示
            if (swipedFromIndices.size >= images.length) return;

            let currentTurn = Math.round(currentTotalRotation / 180);
            let currentIndex = getIndexForTurn(currentTurn);

            // 如果停留在「還沒有滑過」的頁面，倒數 3 秒後顯示提示
            if (!swipedFromIndices.has(currentIndex)) {
                swipeHintTimer = setTimeout(() => {
                    hintSwipe.classList.add('active');
                }, 3000);
            }
        }

        envelope.addEventListener('click', function() {
            if (!envelope.classList.contains('open')) {
                clearTimeout(clickHintTimer);
                hintClick.classList.remove('active');

                envelope.classList.add('open');
                
                bgMusic.play().then(() => {
                    musicPlayer.classList.remove('paused');
                    musicPlayer.classList.add('playing');
                    musicText.innerText = 'Playing';
                }).catch(error => {
                    console.log('音樂自動播放被阻擋：', error);
                });
                
                setTimeout(() => {
                    isExtracted = true;
                    myLetter.classList.add('no-clip'); 
                    myLetter.style.cursor = 'grab';    
                    
                    // 🌟 啟動第一頁的提示倒數
                    triggerSwipeHint();

                }, 2400);
            }
        });

        musicPlayer.addEventListener('click', function(e) {
            e.stopPropagation(); 
            if (bgMusic.paused) {
                bgMusic.play();
                musicPlayer.classList.remove('paused');
                musicPlayer.classList.add('playing');
                musicText.innerText = 'Playing';
            } else {
                bgMusic.pause();
                musicPlayer.classList.remove('playing');
                musicPlayer.classList.add('paused');
                musicText.innerText = 'Paused';
            }
        });
        
        musicPlayer.addEventListener('touchstart', function(e) {
            e.stopPropagation();
        }, { passive: true });

        function startDrag(e) {
            if (!isExtracted || isAnimating) return;
            if (e.touches && e.touches.length > 1) return;
            
            // 🌟 紀錄使用者剛從哪一頁開始滑動，並立刻隱藏目前的提示
            let currentTurn = Math.round(currentTotalRotation / 180);
            swipedFromIndices.add(getIndexForTurn(currentTurn));
            
            clearTimeout(swipeHintTimer);
            hintSwipe.classList.remove('active');

            isDragging = true;
            cardInner.style.transition = 'none'; 
            myLetter.style.cursor = 'grabbing';
            
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startRotation = currentTotalRotation; 
        }

        function docDrag(e) {
            if (!isDragging) return;
            if (e.touches && e.touches.length > 1) {
                endDrag();
                return;
            }
            
            if (e.cancelable) e.preventDefault();
            
            const currentX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = (currentX - startX) / currentScale; 
            
            currentTotalRotation = startRotation + (deltaX / 300) * 180;
            cardInner.style.transform = `rotateY(${currentTotalRotation}deg)`;

            let lowerTurn = Math.floor(currentTotalRotation / 180);
            let upperTurn = lowerTurn + 1;

            let evenTurn = (lowerTurn % 2 === 0) ? lowerTurn : upperTurn;
            let oddTurn = (lowerTurn % 2 !== 0) ? lowerTurn : upperTurn;

            imgFront.src = images[getIndexForTurn(evenTurn)];
            imgBack.src = images[getIndexForTurn(oddTurn)];
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            isAnimating = true; 
            myLetter.style.cursor = 'grab';

            cardInner.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';

            currentTotalRotation = Math.round(currentTotalRotation / 180) * 180;
            cardInner.style.transform = `rotateY(${currentTotalRotation}deg)`;

            setTimeout(() => {
                isAnimating = false;
                let lowerTurn = Math.floor(currentTotalRotation / 180);
                let upperTurn = lowerTurn + 1;
                let evenTurn = (lowerTurn % 2 === 0) ? lowerTurn : upperTurn;
                let oddTurn = (lowerTurn % 2 !== 0) ? lowerTurn : upperTurn;
                imgFront.src = images[getIndexForTurn(evenTurn)];
                imgBack.src = images[getIndexForTurn(oddTurn)];
                
                // 🌟 動畫翻頁結束後，檢查新的一頁是否需要顯示提示
                triggerSwipeHint();
            }, 500);
        }

        myLetter.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', docDrag);
        window.addEventListener('mouseup', endDrag);

        myLetter.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', docDrag, { passive: false });
        window.addEventListener('touchend', endDrag);
    </script>

</body>
</html>
