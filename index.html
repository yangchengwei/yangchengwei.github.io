<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西式婚禮喜帖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #FDFBF7 0%, #E8DFD5 100%);
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 360px;
            height: 240px;
            animation: flyIn 1.8s cubic-bezier(0.25, 1, 0.4, 1) forwards;
            cursor: pointer;
        }

        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #E8DACB;
            border-radius: 6px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05), 0 15px 35px rgba(180, 160, 140, 0.4);
            z-index: 1;
        }

        .letter {
            position: absolute;
            width: 280px;
            height: 395px; 
            left: 40px; 
            bottom: 15px; 
            background-color: #000;
            border-radius: 6px;
            object-fit: cover;
            clip-path: inset(175px 0 0 0); 
            z-index: 3; 
            /* 移除了原本的 transition，改用 keyframes 來控制兩階段動作 */
        }

        .front-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            filter: drop-shadow(0 -3px 8px rgba(180, 160, 140, 0.3));
            pointer-events: none;
        }

        .front-shape {
            width: 100%;
            height: 100%;
            background: #FCFAF8;
            clip-path: path('M 0,240 L 360,240 L 360,0 Q 180,140 0,0 Z');
        }

        .top-flap-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 170px;
            z-index: 5;
            transform-origin: top;
            filter: drop-shadow(0 4px 10px rgba(180, 160, 140, 0.35));
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        z-index 0s 0.3s;
        }

        .flap-shape {
            width: 100%;
            height: 100%;
            background: #FCFAF8;
            clip-path: path('M 0,0 L 360,0 L 220,105 Q 180,145 140,105 Z');
        }

        .wax-seal {
            position: absolute;
            width: 46px;
            height: 46px;
            background-color: #8B2632;
            border-radius: 50%;
            left: 157px;
            top: 100px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E2C792;
            font-size: 20px;
            animation: pulse 2s infinite;
        }

        .envelope-wrapper.open .top-flap-container {
            transform: rotateX(180deg);
            z-index: 2; 
        }

        /* 觸發兩段式的抽出並置中動畫 */
        .envelope-wrapper.open .letter {
            animation: pullAndCenter 2s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
        }

        @keyframes flyIn {
            0% { transform: translateY(-100vh) rotate(-10deg) scale(0.8); opacity: 0; }
            100% { transform: translateY(10vh) rotate(0deg) scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 0 rgba(139, 38, 50, 0.4); }
            70% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 15px rgba(139, 38, 50, 0); }
            100% { box-shadow: inset 0 0 8px rgba(0,0,0,0.4), 0 0 0 0 rgba(139, 38, 50, 0); }
        }

        /* 抽出信件並移動到畫面正中間的核心邏輯 */
        @keyframes pullAndCenter {
            0% {
                transform: translateY(0);
                clip-path: inset(175px 0 0 0);
                z-index: 3;
            }
            49% {
                /* 動作一：向上完整抽出，確保底部離開信封口袋 */
                transform: translateY(-230px);
                clip-path: inset(0 0 0 0);
                z-index: 3;
            }
            50% {
                /* 動作一結束瞬間：將影片移到最上層，準備蓋在信封上方 */
                transform: translateY(-230px);
                clip-path: inset(0 0 0 0);
                z-index: 6;
            }
            100% {
                /* 動作二：往下移動到畫面絕對正中間
                   (92.5px 是信件與信封的高度中心差，-10vh 負責抵銷信封進場時留下的偏移) 
                */
                transform: translateY(calc(92.5px - 10vh));
                clip-path: inset(0 0 0 0);
                z-index: 6;
                box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="myEnvelope">
        <div class="envelope-back"></div>
        
        <video class="letter" id="myVideo" playsinline>
            <source src="video.mov">
        </video>

        <div class="front-pocket">
            <div class="front-shape"></div>
        </div>

        <div class="top-flap-container">
            <div class="flap-shape"></div>
            <div class="wax-seal">❤</div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('myEnvelope');
        const myVideo = document.getElementById('myVideo');

        envelope.addEventListener('click', function() {
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
                
                myVideo.play().catch(error => {
                    console.log('播放失敗：', error);
                });
            }
        });
    </script>

</body>
</html>
