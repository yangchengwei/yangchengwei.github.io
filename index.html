<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片自動播放</title>
    <style>
        /* 讓影片全螢幕居中對齊，並呈現黑色背景 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 保持影片比例縮放 */
        }
    </style>
</head>
<body>

    <video autoplay muted loop controls playsinline>
        <source src="video.mov" type="video/quicktime">
        <source src="video.mov" type="video/mp4">
        您的瀏覽器不支援此影片格式。
    </video>

</body>
</html>
